<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <canvas id="fractal-bg"></canvas>
  <div class="site-wrapper">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/cr/' | relative_url }}">Comprehensive Relativity</a>
      <a href="{{ '/consulting/' | relative_url }}">Consulting</a>
      <a href="{{ '/writing/' | relative_url }}">Writing</a>
      <a href="{{ '/consulting/contact/' | relative_url }}">Contact</a>
    </nav>
    <main class="content">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>© {{ site.time | date: '%Y' }} Isa [Lastname]</p>
    </footer>
  </div>
  <script>
  const canvas = document.getElementById('fractal-bg');
  const ctx = canvas.getContext('2d');

  canvas.style.position = 'fixed';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.zIndex = '-1';

  function drawJulia() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;

    const cRe = 0.0;
    const cIm = 1.0;

    const maxIter = 256;
    const zoom = 1.5;
    const imageData = ctx.createImageData(W, H);

    for (let px = 0; px < W; px++) {
      for (let py = 0; py < H; py++) {
        let zRe = (px - W / 2) / (zoom * W / 2);
        let zIm = (py - H / 2) / (zoom * H / 2);

        let iter = 0;
        while (zRe*zRe + zIm*zIm <= 4 && iter < maxIter) {
          const zRe2 = zRe*zRe - zIm*zIm + cRe;
          zIm = 2*zRe*zIm + cIm;
          zRe = zRe2;
          iter++;
        }

        const idx = (py * W + px) * 4;

        if (iter === maxIter) {
          imageData.data[idx]   = 0;
          imageData.data[idx+1] = 0;
          imageData.data[idx+2] = 8;
        } else {
          const t = (iter + 1 - Math.log2(
            Math.log2(zRe*zRe + zIm*zIm)
          )) / maxIter;

          imageData.data[idx]   = Math.floor(Math.pow(t, 0.5) * 30);
          imageData.data[idx+1] = Math.floor(Math.pow(t, 0.4) * 80);
          imageData.data[idx+2] = Math.floor(Math.pow(t, 0.3) * 255);
        }
        imageData.data[idx+3] = 255;
      }
    }
    ctx.putImageData(imageData, 0, 0);
  }

  drawJulia();
  window.addEventListener('resize', drawJulia);
  </script>
</body>
</html>
