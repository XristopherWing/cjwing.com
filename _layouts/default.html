<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
  <canvas id="fractal-bg"></canvas>
<script>
const canvas = document.getElementById('fractal-bg');
const ctx = canvas.getContext('2d');

canvas.style.position = 'fixed';
canvas.style.top = '0';
canvas.style.left = '0';
canvas.style.width = '100%';
canvas.style.height = '100%';
canvas.style.zIndex = '-1';

function drawMandelbrot() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  const maxIter = 128;
  const imageData = ctx.createImageData(W, H);

  // Centered view of Mandelbrot set
  const xMin = -2.5, xMax = 1.0;
  const yMin = -1.25, yMax = 1.25;

  for (let px = 0; px < W; px++) {
    for (let py = 0; py < H; py++) {
      const x0 = xMin + (px / W) * (xMax - xMin);
      const y0 = yMin + (py / H) * (yMax - yMin);
      let x = 0, y = 0, iter = 0;

      while (x*x + y*y <= 4 && iter < maxIter) {
        const xTemp = x*x - y*y + x0;
        y = 2*x*y + y0;
        x = xTemp;
        iter++;
      }

      const idx = (py * W + px) * 4;
      if (iter === maxIter) {
        imageData.data[idx] = 0;
        imageData.data[idx+1] = 0;
        imageData.data[idx+2] = 0;
      } else {
        const t = iter / maxIter;
        imageData.data[idx]   = Math.floor(9  * (1-t) * t*t*t * 255);
        imageData.data[idx+1] = Math.floor(15 * (1-t)*(1-t) * t*t * 255);
        imageData.data[idx+2] = Math.floor(8.5* (1-t)*(1-t)*(1-t) * t * 255);
      }
      imageData.data[idx+3] = 255;
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

drawMandelbrot();
window.addEventListener('resize', drawMandelbrot);
</script>
<body>
  <div class="site-wrapper">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/cr/' | relative_url }}">Comprehensive Relativity</a>
      <a href="{{ '/consulting/' | relative_url }}">Consulting</a>
      <a href="{{ '/writing/' | relative_url }}">Writing</a>
      <a href="{{ '/consulting/contact/' | relative_url }}">Contact</a>
    </nav>
    <main class="content">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>© {{ site.time | date: '%Y' }} Isa [Lastname]</p>
    </footer>
  </div>
</body>
</html>
